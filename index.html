
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>주조 데이터 대시보드</title>
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
</head>
<body>

<h2>주조 데이터 대시보드</h2>

<select id="item"></select>
<div id="chart" style="width:100%;height:600px;"></div>

<script>

async function loadItems(){
    const res = await fetch("manifest.json");
    const data = await res.json();

    const sel = document.getElementById("item");

    Object.keys(data).forEach(k=>{
        let opt = document.createElement("option");
        opt.value = k;
        opt.innerText = k;
        sel.appendChild(opt);
    });

    sel.onchange = ()=>loadChart(sel.value);
    loadChart(sel.value);
}

async function loadChart(item){
    const manifest = await fetch("manifest.json").then(r=>r.json());
    const file = manifest[item];

    const data = await fetch("data/" + file).then(r=>r.json());

    const grouped = {};

    data.forEach(d=>{
        if(!grouped[d.unit]) grouped[d.unit] = [];
        grouped[d.unit].push(d);
    });

    const traces = [];

    Object.keys(grouped).forEach(unit=>{
        let arr = grouped[unit];

        arr.sort((a,b)=> new Date(a.date) - new Date(b.date));

        traces.push({
            x: arr.map(d=>d.date + " " + d.shift),
            y: arr.map(d=>d.avg),
            mode: "lines+markers",
            name: "주조기 " + unit
        });
    });

    Plotly.newPlot("chart", traces, {
        xaxis:{tickangle:-90},
        yaxis:{},
    });
}

loadItems();

</script>

</body>
</html>
